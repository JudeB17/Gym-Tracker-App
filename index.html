<style>
  html,body{margin:0;padding:0;background:#0E1116;overscroll-behavior:none;}
  *{box-sizing:border-box;}
  #root{min-height:100vh;}
  body{padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);}
  #err{display:none;color:#E56B6B;font-family:system-ui,sans-serif;padding:24px;font-size:15px;line-height:1.5;}
</style>
</head>
<body>
<div id="root"><div style="color:#7C8794;font-family:system-ui,sans-serif;padding:40px;text-align:center;">Loading…</div></div>
<div id="err"></div>

<!-- React + Babel (Babel compiles the JSX in app.js in-browser; no build step) -->
<script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js"></script>

<!-- app data + storage (plain JS, run immediately) -->
<script src="./data.js"></script>
<script src="./storage.js"></script>

<!-- main app (JSX, compiled by Babel via type="text/babel") -->
<script type="text/babel" data-presets="react" src="./app.js"></script>

<script>
  // Diagnostic guard: if React/Babel didn't load, or the app never mounts, say so
  (function () {
    function fail(msg){ var e=document.getElementById('err'); e.style.display='block'; e.textContent='Could not start the app: '+msg+'. If offline, connect and reload.'; }
    if (typeof React==='undefined' || typeof ReactDOM==='undefined') { fail('React failed to load (check connection)'); return; }
    if (typeof Babel==='undefined') { fail('Babel failed to load (check connection)'); return; }
    if (!window.GymData || !window.GymStore) { fail('app data/storage failed to load (data.js / storage.js missing)'); return; }
    setTimeout(function(){
      var root=document.getElementById('root');
      if (root && root.textContent.trim()==='Loading…') {
        fail('app did not mount (JSX compile error - open the console for details)');
      }
    }, 6000);
  })();
</script>
</body>
